name: CI/CD Pipeline

on:
  push:
    branches:
      - development
      - staging
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        shell: powershell
        run: |
          docker logout ghcr.io
          docker login ghcr.io -u fedroaja -p "${{ secrets.GHCR_PAT }}"

      - name: Build test image
        shell: powershell
        run: |
          docker build -t "ghcr.io/fedroaja/basic-cicd:${{ github.sha }}" .

      - name: Run tests
        shell: powershell
        run: |
          docker run --rm "ghcr.io/fedroaja/basic-cicd:${{ github.sha }}" npm test

  deploy:
    runs-on: self-hosted
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        shell: powershell
        run: |
          docker logout ghcr.io
          docker login ghcr.io -u fedroaja -p "${{ secrets.GHCR_PAT }}"

      - name: Build & Push image
        shell: powershell
        run: |
          $tag = "ghcr.io/fedroaja/basic-cicd:${{ github.sha }}"
          $latest = "ghcr.io/fedroaja/basic-cicd:latest"

          docker build -t $tag .
          docker tag $tag $latest

          docker push $tag
          docker push $latest

      - name: Stop old containers
        shell: powershell
        run: |
          docker compose down --remove-orphans

      # -------------------------
      # STAGING
      # -------------------------
      - name: Deploy staging
        if: github.ref == 'refs/heads/staging'
        shell: powershell
        run: |
          $env:IMAGE = "ghcr.io/fedroaja/basic-cicd:${{ github.sha }}"
          docker compose up -d --force-recreate

      # -------------------------
      # PRODUCTION
      # -------------------------
      - name: Deploy production
        if: github.ref == 'refs/heads/main'
        shell: powershell
        run: |
          $env:IMAGE = "ghcr.io/fedroaja/basic-cicd:${{ github.sha }}"
          docker compose up -d --force-recreate