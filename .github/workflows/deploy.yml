name: CI/CD Pipeline

on:
  push:
    branches:
      - development
      - staging
      - main

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: fedroaja/basic-cicd

jobs:
  test:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u fedroaja --password-stdin

      - name: Build test image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .

      - name: Run tests
        run: |
          docker run --rm $REGISTRY/$IMAGE_NAME:${{ github.sha }} npm test

  deploy:
    runs-on: self-hosted
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u fedroaja --password-stdin

      # -------------------------
      # BUILD & PUSH ONLY ONCE
      # -------------------------
      - name: Build & Push image
        run: |
          docker build -t $REGISTRY/$IMAGE_NAME:${{ github.sha }} .
          docker tag $REGISTRY/$IMAGE_NAME:${{ github.sha }} $REGISTRY/$IMAGE_NAME:latest

          docker push $REGISTRY/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$IMAGE_NAME:latest

      - name: Stop old containers
        run: docker compose down --remove-orphans || true

      # -------------------------
      # DEVELOPMENT
      # -------------------------
      - name: Deploy development
        if: github.ref == 'refs/heads/development'
        run: |
          IMAGE=$REGISTRY/$IMAGE_NAME:${{ github.sha }} docker compose up -d --force-recreate

      # -------------------------
      # STAGING
      # -------------------------
      - name: Deploy staging
        if: github.ref == 'refs/heads/staging'
        run: |
          IMAGE=$REGISTRY/$IMAGE_NAME:${{ github.sha }} docker compose up -d --force-recreate

      # -------------------------
      # PRODUCTION
      # -------------------------
      - name: Deploy production
        if: github.ref == 'refs/heads/main'
        run: |
          IMAGE=$REGISTRY/$IMAGE_NAME:${{ github.sha }} docker compose up -d --force-recreate